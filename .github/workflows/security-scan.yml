name: Security Scan

on:
  pull_request:

jobs:
  scan-matched:
    name: "Scan (matched mode)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      found-risks: ${{ steps.scan.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@v4

      - id: scan
        uses: Qxisylolo/security-review@main
        continue-on-error: true
        with:
          match-mode: matched
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

  scan-all:
    name: "Scan (all topics)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      found-risks: ${{ steps.scan.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@v4

      - id: scan
        uses: Qxisylolo/security-review@main
        continue-on-error: true
        with:
          match-mode: all
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

  report:
    name: "Final Result"
    needs: [scan-matched, scan-all]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if both modes found risks
        if: needs.scan-matched.outputs.found-risks == 'true' && needs.scan-all.outputs.found-risks == 'true'
        run: |
          echo "Both matched and all modes found security risks"
          exit 1
